# ─────────────────────────────────────────────────────────────────────────────
# Cloudflare Containers – UruFactura API
# ─────────────────────────────────────────────────────────────────────────────
# Prerequisites:
#   npm install -g wrangler
#   wrangler login
#
# Deploy:
#   cd cloudflare
#   wrangler deploy
# ─────────────────────────────────────────────────────────────────────────────

name            = "urufactura-api"
main            = "worker.js"
compatibility_date = "2025-05-01"

# ── Container image ───────────────────────────────────────────────────────────
# After the docker.yml GitHub Action pushes the image, replace <IMAGE> with the
# full reference printed in the "Extract metadata" step, e.g.:
#   ghcr.io/mathiasgonzalez/urufacturasdk-api:latest
[containers]
image        = "ghcr.io/mathiasgonzalez/urufacturasdk-api:latest"
# Set max_instances to the expected number of concurrent tenants.
# With 1 (the minimum) only one tenant container runs at a time; each new
# X-Tenant-Id would evict the previous tenant's container and its in-memory
# CAEs.  Raise this to match your actual tenant count for multi-tenant
# deployments.  Single-tenant deployments can keep max_instances = 1.
max_instances = 10

# ── Durable Object binding (required by Cloudflare Containers) ────────────────
[[durable_objects.bindings]]
name       = "CONTAINER"
class_name = "UruFacturaContainer"

[[migrations]]
tag         = "v1"
new_classes = ["UruFacturaContainer"]

# ── Environment variables passed to the container ─────────────────────────────
# Sensitive values (certificate, passwords) must be set as Cloudflare Secrets,
# not hardcoded here. Use:
#   wrangler secret put UruFactura__CertificadoBase64
#   wrangler secret put UruFactura__PasswordCertificado
#
# Non-sensitive values can be set as plain vars:
[vars]
UruFactura__Ambiente          = "Homologacion"   # or "Produccion"
UruFactura__RutEmisor         = "000000000000"
UruFactura__RazonSocialEmisor = "EMPRESA DE PRUEBA SA"
UruFactura__DomicilioFiscal   = "18 DE JULIO 1234"
UruFactura__Ciudad            = "MONTEVIDEO"
UruFactura__Departamento      = "MONTEVIDEO"
# Pre-load CAEs on startup (JSON array). Use wrangler secret put for this value
# if it contains sensitive data, or set it as a plain var for homologation tests.
#
# Example value:
#   [{"NroSerie":"CAE001","Tipo":101,"RangoDesde":1,"RangoHasta":1000,"FechaVencimiento":"2026-12-31"}]
#
# UruFactura__Caes = '[...]'
