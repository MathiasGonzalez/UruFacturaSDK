# ─────────────────────────────────────────────────────────────────────────────
# Cloudflare Worker – UruFactura Email Service
# ─────────────────────────────────────────────────────────────────────────────
# Worker dedicado al envío de emails transaccionales.
# Puede invocarse desde Pages Functions via service binding o HTTP directo.
#
# Deploy:
#   cd cloudflare/email-worker
#   wrangler deploy
#
# Secrets:
#   wrangler secret put EMAIL_API_KEY
# ─────────────────────────────────────────────────────────────────────────────

name = "urufactura-email"
main = "worker.js"
compatibility_date = "2025-05-01"

[vars]
MAIL_FROM = "noreply@urufactura.dev"
APP_NAME = "UruFactura"
ALLOWED_ORIGINS = "https://admin.urufactura.dev"

# Para usar proveedor externo (Resend, SendGrid):
# EMAIL_API_URL = "https://api.resend.com/emails"
# EMAIL_API_KEY → secret (wrangler secret put EMAIL_API_KEY)
