name = "invoice-mailer"
main = "src/index.js"
compatibility_date = "2024-01-01"

# ── Secrets (configure via `wrangler secret put <name>` or Cloudflare dashboard) ──
# SENDER_EMAIL       – verified sender address (must be in Cloudflare Email Routing)
# SENDER_NAME        – display name for the sender (e.g. "UruErp Facturación")
# ALLOWED_API_SECRET – shared secret sent by the API in the X-Api-Secret header

# ── Optional Email Routing binding (for Email Workers) ───────────────────────
# [[send_email]]
# name = "INVOICE_MAILER"
# default_from = "noreply@yourdomain.com"
# Uncomment the above and remove the MailChannels section in index.js if you
# prefer Email Workers over MailChannels.
