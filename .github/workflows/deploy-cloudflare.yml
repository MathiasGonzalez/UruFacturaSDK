name: Deploy to Cloudflare Containers

# ─────────────────────────────────────────────────────────────────────────────
# Triggered manually or when a version tag is pushed.
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#
#   CLOUDFLARE_API_TOKEN      — Cloudflare API token with Workers/Containers deploy rights
#   CLOUDFLARE_ACCOUNT_ID     — Cloudflare account ID
#
#   UruFactura secrets forwarded to the container (single-tenant example):
#   URUFACTURA_RUT_EMISOR
#   URUFACTURA_RAZON_SOCIAL
#   URUFACTURA_DOMICILIO_FISCAL
#   URUFACTURA_CERT_B64           — base64-encoded .p12 certificate
#   URUFACTURA_CERT_PASSWORD
#   URUFACTURA_CAES               — JSON array of CAEs (optional)
#
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ambiente:
        description: Ambiente DGI
        required: true
        default: Homologacion
        type: choice
        options:
          - Homologacion
          - Produccion

jobs:
  # ── 1. Build & push container image ─────────────────────────────────────────
  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      # Single sha-prefixed tag used by the deploy job so we don't reconstruct
      # the tag independently (avoids fragile SHA length coupling).
      sha_tag: ${{ steps.sha_tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${OWNER}/urufacturasdk-api" >> "$GITHUB_OUTPUT"

      - name: Compute SHA tag for deploy
        id: sha_tag
        shell: bash
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT="${GITHUB_SHA::7}"
          echo "value=ghcr.io/${OWNER}/urufacturasdk-api:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/UruFactura.CloudflareApi/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Provision secrets & deploy to Cloudflare ──────────────────────────────
  deploy:
    name: Deploy to Cloudflare
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: cloudflare   # optional: require manual approval in repo settings

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js for Wrangler
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      # Stamp the exact SHA tag produced by the build job into wrangler.toml.
      # Using the build output avoids reconstructing the tag here and keeps both
      # jobs in sync even if docker/metadata-action's sha format ever changes.
      - name: Update container image in wrangler.toml
        run: |
          IMAGE="${{ needs.build.outputs.sha_tag }}"
          sed -i "s|image *= *\"[^\"]*\"|image = \"${IMAGE}\"|" cloudflare/wrangler.toml

      # Provision required Cloudflare secrets.
      # printf '%s' avoids the trailing newline that `echo` would append, which
      # would corrupt base64 values (Convert.FromBase64String fails on \n) and
      # break certificate password comparisons.
      - name: Provision Cloudflare secrets
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RUT_EMISOR:       ${{ secrets.URUFACTURA_RUT_EMISOR }}
          RAZON_SOCIAL:     ${{ secrets.URUFACTURA_RAZON_SOCIAL }}
          DOMICILIO_FISCAL: ${{ secrets.URUFACTURA_DOMICILIO_FISCAL }}
          CERT_B64:         ${{ secrets.URUFACTURA_CERT_B64 }}
          CERT_PASSWORD:    ${{ secrets.URUFACTURA_CERT_PASSWORD }}
          CAES:             ${{ secrets.URUFACTURA_CAES }}
        run: |
          printf '%s' "$RUT_EMISOR"       | wrangler secret put UruFactura__RutEmisor
          printf '%s' "$RAZON_SOCIAL"     | wrangler secret put UruFactura__RazonSocialEmisor
          printf '%s' "$DOMICILIO_FISCAL" | wrangler secret put UruFactura__DomicilioFiscal
          printf '%s' "$CERT_B64"         | wrangler secret put UruFactura__CertificadoBase64
          printf '%s' "$CERT_PASSWORD"    | wrangler secret put UruFactura__PasswordCertificado
          # Only create/update the CAES secret when it is explicitly set.
          # Running `wrangler secret put` with an empty value would overwrite any
          # value set out-of-band and silently clear the CAE seed for the container.
          if [ -n "$CAES" ]; then
            printf '%s' "$CAES" | wrangler secret put UruFactura__Caes
          fi

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare
          # Default to Homologacion for both tag pushes and manual dispatches
          # unless the caller explicitly chooses Produccion in the workflow_dispatch
          # input.  This prevents a misconfigured tag push from accidentally
          # deploying to production.
          command: deploy --var UruFactura__Ambiente=${{ github.event.inputs.ambiente || 'Homologacion' }}
