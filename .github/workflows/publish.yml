name: Publish NuGet

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  publish:
    name: Build, Pack & Publish NuGet
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract versions from csproj
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/UruFactura/UruFactura.csproj)
          VERSION_LITE=$(grep -oP '(?<=<Version>)[^<]+' src/UruFactura.Lite/UruFactura.Lite.csproj)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION_LITE=$VERSION_LITE" >> "$GITHUB_OUTPUT"

      - name: Restore dependencies
        run: dotnet restore UruFactura.slnx

      - name: Build
        run: dotnet build UruFactura.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test UruFactura.slnx --no-build --configuration Release --verbosity normal

      - name: Pack UruFactura
        run: >
          dotnet pack src/UruFactura/UruFactura.csproj
          --no-build
          --configuration Release
          --output ./nupkg

      - name: Pack UruFactura.Lite
        run: >
          dotnet pack src/UruFactura.Lite/UruFactura.Lite.csproj
          --no-build
          --configuration Release
          --output ./nupkg

      - name: Upload NuGet package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.VERSION }}
          path: ./nupkg/*.nupkg
          retention-days: 30

      - name: Publish to NuGet.org
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Publish to GitHub Packages
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          --skip-duplicate
