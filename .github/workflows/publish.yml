name: Publish NuGet

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  publish:
    name: Build, Pack & Publish NuGet
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/UruFacturaSDK/UruFacturaSDK.csproj)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore dependencies
        run: dotnet restore UruFacturaSDK.slnx

      - name: Build
        run: dotnet build UruFacturaSDK.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test UruFacturaSDK.slnx --no-build --configuration Release --verbosity normal

      - name: Pack
        run: >
          dotnet pack src/UruFacturaSDK/UruFacturaSDK.csproj
          --no-build
          --configuration Release
          --output ./nupkg

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package-${{ steps.version.outputs.VERSION }}
          path: ./nupkg/*.nupkg
          retention-days: 30

      - name: Publish to NuGet.org
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
