name: Publish NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore dependencies
        run: dotnet restore UruFacturaSDK.slnx

      - name: Build
        run: dotnet build UruFacturaSDK.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test UruFacturaSDK.slnx --no-build --configuration Release --verbosity normal

      - name: Pack
        run: >
          dotnet pack src/UruFacturaSDK/UruFacturaSDK.csproj
          --no-build
          --configuration Release
          -p:Version=${{ steps.version.outputs.VERSION }}
          --output ./nupkg

      - name: Publish to NuGet.org
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
