name: Deploy Email Worker

# ─────────────────────────────────────────────────────────────────────────────
# Deploys the email worker to Cloudflare Workers.
#
# Triggered on pushes to main that touch cloudflare/email-worker/,
# or manually via workflow_dispatch.
#
# Required GitHub secrets:
#   CLOUDFLARE_API_TOKEN    — Cloudflare API token with Workers deploy rights
#   CLOUDFLARE_ACCOUNT_ID   — Cloudflare account ID
#
# Required Cloudflare Worker secrets (set via CLI or dashboard):
#   EMAIL_API_KEY           — (optional) API key for external email provider
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare/email-worker/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Email Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare/email-worker
          command: deploy
