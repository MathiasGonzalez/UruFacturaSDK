name: Deploy Admin to Cloudflare Pages

# ─────────────────────────────────────────────────────────────────────────────
# Deploys the admin SPA + Pages Functions to Cloudflare Pages.
#
# Triggered on pushes to main that touch admin/, or manually via workflow_dispatch.
#
# Required GitHub secrets:
#   CLOUDFLARE_API_TOKEN    — Cloudflare API token with Pages deploy rights
#   CLOUDFLARE_ACCOUNT_ID   — Cloudflare account ID
#
# Required Cloudflare Pages secrets (set via dashboard or CLI):
#   JWT_SECRET              — HMAC-SHA256 signing key for auth tokens
#   EMAIL_API_KEY           — (optional) API key for external email provider
#
# KV Namespaces (must exist before first deploy):
#   AUTH_CODES, AUTH_SESSIONS, TENANTS
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Admin
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Build
        working-directory: admin
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://urufactura-api.workers.dev' }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: admin
          command: pages deploy dist --project-name urufactura-admin
