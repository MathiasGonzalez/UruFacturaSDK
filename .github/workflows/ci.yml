name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore UruFacturaSDK.slnx

      - name: Build
        run: dotnet build UruFacturaSDK.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test UruFacturaSDK.slnx --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --settings tests/UruFacturaSDK.Tests/coverlet.runsettings

      - name: Pack UruFacturaSDK (verify)
        run: >
          dotnet pack src/UruFacturaSDK/UruFacturaSDK.csproj
          --no-build
          --configuration Release
          --output /tmp/nupkg-ci

      - name: Pack UruFacturaSDK.Lite (verify)
        run: >
          dotnet pack src/UruFacturaSDK.Lite/UruFacturaSDK.Lite.csproj
          --no-build
          --configuration Release
          --output /tmp/nupkg-ci

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: '**/coverage.cobertura.xml'
          retention-days: 7
