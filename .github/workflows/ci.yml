name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore UruFactura.slnx

      - name: Build
        run: dotnet build UruFactura.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test UruFactura.slnx --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --settings tests/UruFactura.Tests/coverlet.runsettings

      - name: Pack UruFactura (verify)
        run: >
          dotnet pack src/UruFactura/UruFactura.csproj
          --no-build
          --configuration Release
          --output /tmp/nupkg-ci

      - name: Pack UruFactura.Lite (verify)
        run: >
          dotnet pack src/UruFactura.Lite/UruFactura.Lite.csproj
          --no-build
          --configuration Release
          --output /tmp/nupkg-ci

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: '**/coverage.cobertura.xml'
          retention-days: 7
