name: Test CloudflareApi

# ─────────────────────────────────────────────────────────────────────────────
# Validates the UruFactura.CloudflareApi project on every push / PR that
# touches it.  Runs two jobs in parallel:
#
#   test   — dotnet build + dotnet test (all 172 SDK unit tests)
#   docker — builds the container image without pushing to verify the
#            Dockerfile compiles and the runtime image starts up healthy.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: ["main"]
    paths:
      - "src/UruFactura.CloudflareApi/**"
      - "src/UruFacturaSDK/**"
      - "src/UruFacturaSDK.Lite/**"
      - ".github/workflows/test-cloudflare-api.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "src/UruFactura.CloudflareApi/**"
      - "src/UruFacturaSDK/**"
      - "src/UruFacturaSDK.Lite/**"
      - ".github/workflows/test-cloudflare-api.yml"
  workflow_dispatch:

jobs:
  # ── 1. .NET unit tests ───────────────────────────────────────────────────────
  test:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore UruFacturaSDK.slnx

      - name: Build
        run: dotnet build UruFacturaSDK.slnx --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test UruFacturaSDK.slnx
          --no-build
          --configuration Release
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --settings tests/UruFacturaSDK.Tests/coverlet.runsettings

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-cloudflare-api
          path: "**/coverage.cobertura.xml"
          retention-days: 7

  # ── 2. Docker image build + smoke test ──────────────────────────────────────
  docker:
    name: Build Docker image & smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/UruFactura.CloudflareApi/Dockerfile
          push: false
          tags: urufactura-api:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Start the container with minimal env vars (no real cert/DGI config).
      # The API should start and the /health endpoint must respond 200.
      - name: Smoke test — GET /health
        run: |
          docker run -d --name urufactura-test \
            -p 8080:8080 \
            -e ASPNETCORE_ENVIRONMENT=Development \
            urufactura-api:test

          # Wait up to 20 s for the API to become ready
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ /health returned 200"
              docker stop urufactura-test
              exit 0
            fi
            echo "Waiting... (attempt $i, status=$STATUS)"
            sleep 1
          done

          echo "❌ API did not become healthy in time"
          docker logs urufactura-test
          docker stop urufactura-test
          exit 1
