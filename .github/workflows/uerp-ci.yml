name: UruErp CI

# Runs on every push / PR that touches the uerp/ directory or the SDK source.
# Does NOT deploy – this is a pure build + test gate.
on:
  push:
    branches: ["main"]
    paths:
      - "uerp/**"
      - "src/**"
      - "tests/**"
  pull_request:
    branches: ["main"]
    paths:
      - "uerp/**"
      - "src/**"
      - "tests/**"

  # Allow manual runs from the Actions tab.
  workflow_dispatch:

jobs:
  # ── .NET build & test ──────────────────────────────────────────────────────
  dotnet:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore SaaS solution
        run: dotnet restore uerp/UruErpApp.slnx

      - name: Build SaaS API
        run: dotnet build uerp/UruErpApp.Api/UruErpApp.Api.csproj --no-restore -c Release

      # Run SDK unit tests
      - name: Restore & Build SDK tests
        run: dotnet build UruFacturaSDK.slnx -c Release

      - name: Test SDK
        run: dotnet test UruFacturaSDK.slnx --no-build -c Release --verbosity normal

  # ── Frontend build ─────────────────────────────────────────────────────────
  frontend:
    name: Build Frontend (Vite)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: uerp/uerp-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: uerp/uerp-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        # VITE_API_URL is intentionally left empty here – CI only checks
        # that the build succeeds.  Set it to your Railway URL in the deploy job.
        run: npm run build
