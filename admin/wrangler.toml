# ─────────────────────────────────────────────────────────────────────────────
# Cloudflare Pages – UruFactura Admin
# ─────────────────────────────────────────────────────────────────────────────
# Usa `wrangler pages dev` para desarrollo local con Pages Functions.
#
# Requisitos:
#   npm install -g wrangler
#   wrangler login
#
# Desarrollo local:
#   cd admin
#   npm install
#   npx wrangler pages dev -- npm run dev
#
# Deploy:
#   npx wrangler pages deploy dist --project-name urufactura-admin
# ─────────────────────────────────────────────────────────────────────────────

name = "urufactura-admin"
compatibility_date = "2025-05-01"
pages_build_output_dir = "dist"

# ── KV Namespaces (bindings para Pages Functions) ─────────────────────────────
# Crear con:
#   wrangler kv namespace create AUTH_CODES
#   wrangler kv namespace create AUTH_SESSIONS
#   wrangler kv namespace create TENANTS
#
# Luego copiar los IDs aquí:
[[kv_namespaces]]
binding = "AUTH_CODES"
id = "REPLACE_WITH_AUTH_CODES_NAMESPACE_ID"

[[kv_namespaces]]
binding = "AUTH_SESSIONS"
id = "REPLACE_WITH_AUTH_SESSIONS_NAMESPACE_ID"

[[kv_namespaces]]
binding = "TENANTS"
id = "REPLACE_WITH_TENANTS_NAMESPACE_ID"

# ── Variables de entorno ──────────────────────────────────────────────────────
# Valores sensibles (JWT_SECRET, EMAIL_API_KEY) deben ser Secrets:
#   wrangler pages secret put JWT_SECRET --project-name urufactura-admin
#   wrangler pages secret put EMAIL_API_KEY --project-name urufactura-admin
[vars]
MAIL_FROM = "noreply@urufactura.dev"
APP_NAME = "UruFactura Admin"
ALLOWED_ORIGIN = "https://admin.urufactura.dev"
# API_URL: URL de la UruFactura CloudflareApi (Worker)
API_URL = "https://urufactura-api.workers.dev"

# Para usar un proveedor de email diferente a MailChannels:
# EMAIL_API_URL = "https://api.resend.com/emails"
# EMAIL_API_KEY → secret
